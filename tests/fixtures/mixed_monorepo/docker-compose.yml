version: '3.9'
services:
  api:
    build: ./apps/api
    ports: ["8000:8000"]
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ecommerce
      REDIS_URL: redis://redis:6379
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
